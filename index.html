<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shade & Shift To-Do</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <!-- HEADER BÚSQUEDA Y FILTRO -->
        <header class="top-bar">
            <div class="search-filter-group">
                <div class="input-wrapper" style="position: relative;">
                    <svg class="icon" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--c-text-muted); width: 16px;" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" class="input-field" placeholder="Buscar sombras maestras..." style="padding-left: 2.5rem;">
                </div>
                
                <select id="tagFilter" class="input-field">
                    <option value="">Todos los Tags</option>
                </select>
            </div>
            
            <button id="manageTagsBtn" class="btn">
                <svg class="icon" style="width: 16px;" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                Gestionar Tags
            </button>
        </header>

        <!-- PANEL HORIZONTAL DE CREACIÓN -->
        <section class="task-form-panel">
            <form id="taskForm">
                <div style="display: flex; gap: 1rem; align-items: center; justify-content: space-between;">
                    <input type="text" id="titleInput" class="input-field" style="flex: 2;" placeholder="Nueva tarea maestra..." required>
                    
                    <div style="position: relative; flex: 1;">
                        <input type="text" id="tagSearchInput" class="input-field" style="width: 100%;" placeholder="Vincular Tags..." autocomplete="off">
                        <div id="tagCustomDropdown" class="dropdown-menu" style="width: 100%;"></div>
                    </div>
                    
                    <button type="submit" id="submitTaskBtn" class="btn btn-primary">
                        Crear Destino
                    </button>
                </div>
                <div id="selectedTagsContainer" class="tags-container" style="margin-top: 0.75rem;"></div>
            </form>
        </section>

        <!-- GRID DE ACORDEONES (Listado Drag & Drop) -->
        <main>
            <div id="tasksGrid" class="tasks-grid">
                <!-- Se inyectan las tareas mediante app.js -->
            </div>
        </main>

    </div>

    <!-- MODAL COMPLEJO: GESTIÓN DE TAGS -->
    <div id="tagsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header" style="margin-bottom: 1rem;">
                <h2>Configuración de Tags</h2>
                <p style="color: var(--c-text-muted); font-size: 0.9rem;">Cambia nombres y asigna la paleta cromática Shade & Shift.</p>
            </div>

            <!-- Creación manual directa -->
            <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--c-border);">
                <input type="text" id="newTagName" class="input-field" style="flex: 1;" placeholder="Nuevo Tag">
                <button id="saveNewTagBtn" class="btn btn-primary">Añadir</button>
            </div>

            <ul id="tagsList" style="list-style: none; display: flex; flex-direction: column; gap: 1rem;">
                <!-- Lista editable de tags -->
            </ul>

            <div class="modal-actions" style="margin-top: 2rem; text-align: right;">
                <button id="closeTagsModalBtn" class="btn">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMACION DANGER -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div class="modal-header">
                <h2>¿Eliminar Sombra?</h2>
                <p style="color: var(--c-text-muted);">Esta acción la borrará permanentemente de tu registro.</p>
            </div>
            <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem;">
                <button id="cancelDeleteBtn" class="btn">Cancelar</button>
                <button id="confirmDeleteBtn" class="btn" style="background: var(--c-salmon); color: white; border-color: var(--c-salmon);">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Toasts Feedback -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
